<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      .btn {
        padding: 20px 40px;
        border-radius: 10px;
        background-color: #5eb9f0;
        font-size: 16px;
        color: #fff;
        font-weight: 600;
        border: none;
        transition:
          background-color 0.5s ease-in-out,
          transform 0.5s ease-in-out;
      }
      .btn-1:hover {
        transform: translateY(-15px);
        box-shadow: 0 15px 15px rgba(0, 0, 0, 0.3);
      }

      .btn-2:hover {
        background-color: orange;
      }
      .btn-3 {
        position: relative;
        overflow: hidden;
      }
      .btn-3 span {
        position: relative;
        z-index: 1;
      }
      .btn-3::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 0;
        background-color: orange;
        transition: width 0.5s ease-in-out;
      }

      .btn-3:hover::after {
        width: 100%;
      }
      .btn-4 {
        position: relative;
        overflow: hidden;
      }
      .btn-4 span {
        position: relative;
        z-index: 1;
      }
      .btn-4::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 0;
        background-color: orange;
        transition: width 0.5s ease-in-out;
      }
      .btn-4:hover::after {
        left: 0;
        width: 100%;
      }
      .text {
        display: inline-block;
        position: relative;
        font-size: 30px;
        font-weight: 600;
        transition: color 1s;
      }
      .text::before {
        position: absolute;
        bottom: 0;
        display: flex;
        align-items: flex-start;
        content: attr(data-text);
        color: orange;
        height: 0;
        white-space: nowrap;
        overflow: hidden;
        transition: height 0.5s ease;
      }
      .text:hover::before {
        top: 0;
        height: 100%;
        align-items: flex-end;
      }

      .input-text {
        position: relative;
      }
      input {
        font-family: inherit;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 15px;
        outline: none;
      }

      input:focus {
        border-color: blueviolet;
      }

      input:focus + label,
      input:not(:placeholder-shown) + label {
        transform: translate(0, -30px);
        color: blueviolet;
        text-shadow:
          -0.1px -0.1px currentColor,
          0.1px 0.1px currentColor;
      }
      label {
        position: absolute;
        color: #666;
        padding: 0 5px;
        background-color: #fff;
        left: 7px;
        top: 50%;
        transform: translate(0, -50%);
        transition:
          color 0.2s ease,
          transform 0.5s ease,
          text-shadow 0.5s ease;
        pointer-events: none;
      }
      input,
      label {
        font-size: 14px;
      }
      .box {
        width: 300px;
        height: 150px;
        background-color: #ccc;
        position: relative;
      }
      .loading {
        width: 50px;
        height: 50px;
        top: 50%;
        left: 50%;
        translate: -50% -50%;
        border-radius: 50%;
        position: fixed;
        z-index: 99;
      }

      .loading.inner {
        position: absolute;
      }
      .loading::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 5px solid red;
        border-color: red transparent red transparent;

        border-radius: 50%;
        animation: spinner 1s linear infinite;
      }
      .loading[data-text]::after {
        position: absolute;
        content: attr(data-text);
        bottom: -30px;
        left: 50%;
        translate: -50%;
        white-space: nowrap;
      }

      @keyframes spinner {
        from {
          rotate: 0;
        }
        to {
          rotate: 90deg;
        }
      }
      
.lds-spinner,
.lds-spinner div,
.lds-spinner div:after {
  box-sizing: border-box;
}
.lds-spinner {
  color: currentColor;
  display: inline-block;
  position: relative;
  width: 80px;
  height: 80px;
}
.lds-spinner div {
  transform-origin: 40px 40px;
  animation: lds-spinner 1.2s linear infinite;
}
.lds-spinner div:after {
  content: " ";
  display: block;
  position: absolute;
  top: 3.2px;
  left: 36.8px;
  width: 6.4px;
  height: 17.6px;
  border-radius: 20%;
  background: currentColor;
}
.lds-spinner div:nth-child(1) {
  transform: rotate(0deg);
  animation-delay: -1.1s;
}
.lds-spinner div:nth-child(2) {
  transform: rotate(30deg);
  animation-delay: -1s;
}
.lds-spinner div:nth-child(3) {
  transform: rotate(60deg);
  animation-delay: -0.9s;
}
.lds-spinner div:nth-child(4) {
  transform: rotate(90deg);
  animation-delay: -0.8s;
}
.lds-spinner div:nth-child(5) {
  transform: rotate(120deg);
  animation-delay: -0.7s;
}
.lds-spinner div:nth-child(6) {
  transform: rotate(150deg);
  animation-delay: -0.6s;
}
.lds-spinner div:nth-child(7) {
  transform: rotate(180deg);
  animation-delay: -0.5s;
}
.lds-spinner div:nth-child(8) {
  transform: rotate(210deg);
  animation-delay: -0.4s;
}
.lds-spinner div:nth-child(9) {
  transform: rotate(240deg);
  animation-delay: -0.3s;
}
.lds-spinner div:nth-child(10) {
  transform: rotate(270deg);
  animation-delay: -0.2s;
}
.lds-spinner div:nth-child(11) {
  transform: rotate(300deg);
  animation-delay: -0.1s;
}
.lds-spinner div:nth-child(12) {
  transform: rotate(330deg);
  animation-delay: 0s;
}
@keyframes lds-spinner {
  0% {
    opacity: 1;
  }
  100% {
    opacity: 0;
  }
}


    </style>
  </head>
  <body>
    <button class="btn btn-1">Hover me!</button>
    <button class="btn btn-2">Hover me!</button>
    <button class="btn btn-3">
      <span>Hover me!</span>
    </button>
    <button class="btn btn-4">
      <span>Hover me!</span>
    </button>
    <div class="text" data-text="Lorem, ipsum dolor.">Lorem, ipsum dolor.</div>
    <div class="input-text">
      <input type="text" name="username" id="username" placeholder="" />
      <label for="username">Username</label>
    </div>
    <div class="loading inner" data-text="Loading..."></div>
    <div class="box">
      <div class="loading inner" data-text="Đang tải.."></div>
    </div>
    <div class="lds-spinner">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </body>
</html>
