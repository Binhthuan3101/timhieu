<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <form action="submit" method="post" autocomplete="on">
        <label>
          Display Name:
          <input type="text" />
        </label>
        <label>
          Email:
          <input type="password" name="" />
        </label>
        <label>
          Phone Number:
          <input type="tel" name="" />
        </label>
        <label>
          Password:
          <input type="password" name="" id="" />
        </label>
        <label>
          Confirm Password:
          <input type="password" name="" id="" />
        </label>
        <label>
          <input type="radio" name="gender" />
          Nam
        </label>
        <label>
          <input type="radio" name="gender" />
          Nữ
        </label>
        <label>
          <input type="radio" name="gender" />
          Khác
        </label>
        <label>
          Date of Birth:
          <input type="date" name="" />
        </label>
        <label>
          Address
          <input type="text" />
        </label>
        <label>
          <img
            src="./img/avatar.png"
            alt="avatar"
            style="width: 100px; height: 100px; border-radius: 50%"
          />
          <input type="file" hidden accept="image/png" />
        </label>
        <label for="email-type">Chọn loại email muốn nhận:</label>
        <label>
          <input type="checkbox" />
          Nhận bản tin định kỳ
        </label>
        <label>
          <input type="checkbox" />
          Nhận thông tin khuyến mãi
        </label>
        <label>
          <input type="checkbox" />
          Nhận cập nhật sản phẩm mới
        </label>
        <button type="submit">submit</button>
      </form>
    </div>
  </body>
</html>
